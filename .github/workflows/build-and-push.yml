name: Build & Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem (ex: 20260303.Hotfix). Vazio = YYYYMMDD.HHMM automático."
        required: false

env:
  IMAGE_BASE: ghcr.io/easytek-automation/easytek-data

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false   # outros serviços continuam se um falhar
      matrix:
        service: [webapp, event-gateway, zpp-processor, node-red, amg-mobile]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir tag da imagem
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=$(date +'%Y%m%d.%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_BASE }}/${{ matrix.service }}:latest
          # Cache por serviço — builds subsequentes muito mais rápidos
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Resumo do build
        run: |
          echo "### ✅ ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${{ steps.tag.outputs.TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Imagem: \`${{ env.IMAGE_BASE }}/${{ matrix.service }}:${{ steps.tag.outputs.TAG }}\`" >> $GITHUB_STEP_SUMMARY
