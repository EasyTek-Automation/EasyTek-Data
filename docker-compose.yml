services:
  webapp:
    build: ./webapp
    ports:
      - "8050:8050"
    env_file:
      - .env.common
    environment:
      # Variáveis que o webapp precisa
      - MONGO_URI=${MONGO_URI}
      - DB_NAME=${DB_NAME}
      - COLLECTION_NAME=${COLLECTION_NAME}
      - OTHER_COLLECTION_NAME=${OTHER_COLLECTION_NAME}
      - ENERGY_COLLECTION=${ENERGY_COLLECTION}
      - TEMP_COLLECTION=${TEMP_COLLECTION}
      - SECRET_KEY=${SECRET_KEY}
      - GATEWAY_URL=${GATEWAY_URL}
    networks:
      - easytek-net

  event-gateway:
    build: ./event-gateway
    ports:
      - "5001:5001"
    env_file:
      - .env.common
    environment:
      # Variáveis que o event-gateway precisa
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER_ADDRESS=${MQTT_BROKER_ADDRESS}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    networks:
      - easytek-net

  node-red:
    container_name: node-red
    build: ./node-red
    restart: unless-stopped
    volumes:
      # 1. Mapeia um volume nomeado APENAS para os node_modules.
      #    Isso preserva os nós instalados pela imagem.
      - node_red_modules:/data/node_modules

      # 2. Mapeia sua configuração local para /data.
      #    Isso sobrescreve tudo em /data, EXCETO a subpasta node_modules,
      #    que já foi montada pelo volume nomeado acima.
      - ./node-red-config:/data
    networks:
      - easytek-net

volumes:
  mongo-data:
  portainer_data:
  # Adicione o novo volume nomeado à lista de volumes
  node_red_modules:

networks:
  easytek-net:
    external: true