services:
  webapp:
    build: ./webapp
    ports:
      - "8050:8050"
    # Apenas o env_file é necessário. Ele carrega TODAS as variáveis do arquivo.
    env_file:
      - .env.common
    networks:
      - easytek-net

  event-gateway:
    build: ./event-gateway
    ports:
      - "5001:5001"
    # Apenas o env_file é necessário.
    env_file:
      - .env.common
    networks:
      - easytek-net

  node-red:
    container_name: node-red
    build: ./node-red
    restart: unless-stopped
    volumes:
      # 1. Mapeia um volume nomeado APENAS para os node_modules.
      #    Isso preserva os nós instalados pela imagem.
      - node_red_modules:/data/node_modules

      # 2. Mapeia sua configuração local para /data.
      #    Isso sobrescreve tudo em /data, EXCETO a subpasta node_modules,
      #    que já foi montada pelo volume nomeado acima.
      - ./node-red-config:/data
    networks:
      - easytek-net

volumes:
  mongo-data:
  portainer_data:
  # Adicione o novo volume nomeado à lista de volumes
  node_red_modules:

networks:
  easytek-net:
    external: true