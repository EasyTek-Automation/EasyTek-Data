services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: 'nginx-proxy-manager'
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ${NGINX_DATA_PATH}:/data
      - ${NGINX_LETSENCRYPT_PATH}:/etc/letsencrypt
    networks:
      - easytek-net

networks:
  easytek-net:
    name: easytek-net
    driver: bridge